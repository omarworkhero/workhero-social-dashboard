name: Refresh Social Dashboard

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-social
  cancel-in-progress: false

timeout-minutes: 15

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Write config from secrets
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python3 -c "
import json, os
cfg = {
  "lookback_days": 90,
  "dashboard_password": os.environ["DASHBOARD_PASSWORD"],
  "facebook": {
    "page_access_token": os.environ["FB_PAGE_TOKEN"],
    "page_id": os.environ["FB_PAGE_ID"]
  },
  "instagram": {
    "page_access_token": os.environ["FB_PAGE_TOKEN"],
    "ig_user_id": os.environ["IG_USER_ID"]
  },
  "youtube": {"api_key": "", "channel_id": ""},
  "linkedin": {"access_token": "", "company_id": ""}
}
open("social_config.json", "w").write(json.dumps(cfg))
"

      - name: Generate dashboard
        run: python3 generate_social_dashboard.py

      - name: Publish as index.html
        run: mv social_dashboard.html index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: refresh dashboard $(date -u +%Y-%m-%d)"
          git push
